services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - bot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: telegram_bot
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      KDRIVE_TOKEN: ${KDRIVE_TOKEN}
      KDRIVE_DRIVE_ID: ${KDRIVE_DRIVE_ID}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      INFOMANIAK_API_KEY: ${INFOMANIAK_API_KEY}
      INFOMANIAK_PRODUCT_ID: ${INFOMANIAK_PRODUCT_ID}
      LLM_MODEL: ${LLM_MODEL}
      CALENDAR_PASSWORD: ${CALENDAR_PASSWORD}
      CALENDAR_USERNAME: ${CALENDAR_USERNAME}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DOCTOR_1_TELEGRAM_ID: ${DOCTOR_1_TELEGRAM_ID}
      DOCTOR_2_TELEGRAM_ID: ${DOCTOR_2_TELEGRAM_ID}
      DOCTOR_3_TELEGRAM_ID: ${DOCTOR_3_TELEGRAM_ID}
      PATIENT_1_TELEGRAM_ID: ${PATIENT_1_TELEGRAM_ID}
      PATIENT_2_TELEGRAM_ID: ${PATIENT_2_TELEGRAM_ID}
      PATIENT_3_TELEGRAM_ID: ${PATIENT_3_TELEGRAM_ID}
      PATIENT_4_TELEGRAM_ID: ${PATIENT_4_TELEGRAM_ID}
    networks:
      - bot_network

volumes:
  db_data:

networks:
  bot_network:
